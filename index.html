            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .cta-ribbon:hover {
            background: linear-gradient(135deg, #be123c 0%, #9f1239 100%);
            transform: rotate(45deg) scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        @media (max-width: 768px) {
            .cta-ribbon {
                font-size: 14px;
                padding: 8px 30px;
                top: 35px;
                right: -80px;

        #loading {
